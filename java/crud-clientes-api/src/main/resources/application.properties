spring.application.name=crud-clientes-api
server.port=8080

# --- Base de datos en memoria H2 (para correr sin instalar nada) ---
spring.datasource.url=jdbc:h2:mem:clientesdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- Hibernate / JPA ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- Swagger / OpenAPI ---
springdoc.swagger-ui.path=/swagger-ui.html

# --- Para producción con PostgreSQL, comentar H2 y usar: ---
# spring.datasource.url=jdbc:postgresql://localhost:5432/clientesdb
# spring.datasource.username=postgres
# spring.datasource.password=secret
